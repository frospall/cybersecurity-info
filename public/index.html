<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Security Awareness</title>
    <meta name="description" content="Understand your digital footprint and see what information is visible online.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="welcome-screen" class="screen active">
        <div class="glitch-container">
            <h1 class="glitch" data-text="SYSTEM COMPROMISED?">SYSTEM COMPROMISED?</h1>
        </div>
        <p class="subtitle">Discover what your digital footprint reveals.</p>
        <button id="start-btn" class="cyber-btn">INITIATE SCAN</button>
    </div>

    <div id="terminal-screen" class="screen">
        <div class="terminal-header">
            <div class="mac-btns">
                <span class="close"></span>
                <span class="minimize"></span>
                <span class="maximize"></span>
            </div>
            <div class="terminal-title">root@global-network:~</div>
        </div>
        <div class="terminal-body" id="terminal-output">
            <!-- Output goes here -->
        </div>
    </div>
    
    <div class="scanlines"></div>

    <div id="end-screen" class="screen">
        <div class="warning-banner">
            <h2>⚠️ SECURITY WARNING ⚠️</h2>
            <p>Never trust everyone on the internet. Your data is your most valuable asset. Stay vigilant and question everything.</p>
        </div>
        <div class="profile-card">
            <div class="profile-avatar">F</div>
            <div class="profile-info">
                <h3>Frospall</h3>
                <p class="role">Head Developer</p>
                <div class="social-links">
                    <span>&lt;/&gt; Building Secure Systems</span>
                </div>
            </div>
        </div>
        <button id="restart-btn" class="cyber-btn" style="margin-top: 30px;">REBOOT SYSTEM</button>
    </div>

    <script src="script.js"></script>
    <script>
        // Anti-Inspect Security
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('keydown', (e) => {
            if (e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && e.key === 'I') || 
                (e.ctrlKey && e.shiftKey && e.key === 'C') || 
                (e.ctrlKey && e.shiftKey && e.key === 'J') || 
                (e.ctrlKey && e.key === 'U')) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
